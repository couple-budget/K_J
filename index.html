<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳本 · 我的記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede6d6;
    --cream-border: #d9ceba;
    --ink: #2c2416;
    --ink-light: #6b5e47;
    --ink-muted: #9e8e76;
    --accent: #c0392b;
    --green: #27ae60;
    --paper: #faf7f2;
    --shadow: rgba(44, 36, 22, 0.08);
    --font-serif: 'DM Serif Display', 'Noto Serif TC', serif;
    --font-body: 'Noto Sans TC', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--ink); font-family: var(--font-body); min-height: 100vh; font-size: 15px; line-height: 1.6; }

  header { background: var(--ink); color: var(--cream); padding: 0 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: var(--font-serif); font-size: 22px; letter-spacing: 0.04em; color: var(--cream); }
  .logo span { color: #c9a96e; }
  nav { display: flex; gap: 2px; }
  nav button { background: none; border: none; color: rgba(245,240,232,0.6); font-family: var(--font-body); font-size: 13px; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
  nav button:hover, nav button.active { background: rgba(255,255,255,0.12); color: var(--cream); }

  main { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }
  .page { display: none; }
  .page.active { display: block; }

  .card { background: var(--paper); border: 1px solid var(--cream-border); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow); }
  .card-title { font-family: var(--font-serif); font-size: 13px; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .summary-box { background: var(--paper); border: 1px solid var(--cream-border); border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px var(--shadow); }
  .summary-box .label { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.06em; margin-bottom: 6px; }
  .summary-box .amount { font-family: var(--font-serif); font-size: 24px; font-weight: 400; color: var(--ink); }
  .summary-box .amount.expense { color: var(--accent); }
  .summary-box .amount.income { color: var(--green); }
  .summary-box .sub { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--ink-muted); margin-bottom: 5px; letter-spacing: 0.04em; }
  .form-input, .form-select { width: 100%; background: var(--cream); border: 1.5px solid var(--cream-border); border-radius: 8px; padding: 11px 14px; font-family: var(--font-body); font-size: 15px; color: var(--ink); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-input:focus, .form-select:focus { border-color: var(--ink); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { padding: 10px; border: 1.5px solid var(--cream-border); border-radius: 8px; background: var(--cream); font-family: var(--font-body); font-size: 14px; cursor: pointer; transition: all 0.2s; color: var(--ink-light); }
  .type-btn.active-expense { background: #fdf0ef; border-color: var(--accent); color: var(--accent); }
  .type-btn.active-income { background: #edf7f1; border-color: var(--green); color: var(--green); }
  .submit-btn { width: 100%; background: var(--ink); color: var(--cream); border: none; border-radius: 10px; padding: 14px; font-family: var(--font-body); font-size: 15px; letter-spacing: 0.04em; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:active { opacity: 0.7; }

  .tx-date-group { margin-bottom: 20px; }
  .tx-date-label { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.08em; padding: 0 4px 6px; margin-bottom: 8px; border-bottom: 1px solid var(--cream-border); }
  .tx-item { display: flex; align-items: center; padding: 12px 14px; background: var(--paper); border: 1px solid var(--cream-border); border-radius: 10px; margin-bottom: 8px; gap: 12px; }
  .tx-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; background: var(--cream-dark); color: var(--ink-light); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-note { font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 11px; color: var(--ink-muted); margin-top: 1px; }
  .tx-amount { font-family: var(--font-serif); font-size: 16px; font-weight: 500; flex-shrink: 0; }
  .tx-amount.expense { color: var(--accent); }
  .tx-amount.income { color: var(--green); }
  .tx-delete { background: none; border: none; color: var(--ink-muted); cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.4; transition: opacity 0.2s; }
  .tx-delete:hover { opacity: 1; color: var(--accent); }

  .chart-wrap { position: relative; height: 240px; margin: 8px 0; }
  .chart-wrap-sm { position: relative; height: 200px; margin: 8px 0; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .month-nav button { background: var(--cream-dark); border: 1px solid var(--cream-border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 16px; color: var(--ink-light); transition: all 0.15s; }
  .month-nav button:hover { background: var(--cream-border); }
  .month-nav .month-title { font-family: var(--font-serif); font-size: 18px; color: var(--ink); }

  .cat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .cat-pill { padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--cream-border); background: var(--paper); font-size: 12px; color: var(--ink-light); cursor: pointer; transition: all 0.15s; }
  .cat-pill.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .empty-state { text-align: center; padding: 32px 20px; color: var(--ink-muted); }
  .empty-state p { font-size: 14px; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--cream); padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: transform 0.3s; z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  .loading { text-align: center; padding: 24px; color: var(--ink-muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo">帳<span>·</span>本</div>
  <nav>
    <button class="active" onclick="showPage('home', this)">首頁</button>
    <button onclick="showPage('records', this)">記錄</button>
    <button onclick="showPage('charts', this)">圖表</button>
  </nav>
</header>

<main>

  <!-- ── 首頁 ── -->
  <div id="page-home" class="page active">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="home-month-title">—</div>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="summary-grid">
      <div class="summary-box">
        <div class="label">本月支出</div>
        <div class="amount expense" id="total-expense">$0</div>
        <div class="sub" id="expense-count">0 筆</div>
      </div>
      <div class="summary-box">
        <div class="label">本月收入</div>
        <div class="amount income" id="total-income">$0</div>
        <div class="sub" id="income-count">0 筆</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">本月結餘</div>
      <div style="font-family: var(--font-serif); font-size: 32px;" id="net-amount">$0</div>
    </div>

    <!-- 新增表單 -->
    <div class="card">
      <div class="card-title">新增一筆</div>

      <div class="form-group">
        <div class="type-toggle">
          <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">− 支出</button>
          <button class="type-btn" id="btn-income" onclick="setType('income')">+ 收入</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">金額（元）</label>
        <input type="number" id="inp-amount" class="form-input" placeholder="0" inputmode="decimal">
      </div>

      <div class="form-group">
        <label class="form-label">分類</label>
        <select id="inp-category" class="form-select"></select>
      </div>

      <div class="form-group">
        <label class="form-label">備註（選填）</label>
        <input type="text" id="inp-note" class="form-input" placeholder="例如：午餐、捷運">
      </div>

      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" id="inp-date" class="form-input">
      </div>

      <button class="submit-btn" onclick="addTransaction()">記錄這筆</button>
    </div>

    <div class="card">
      <div class="card-title">最近記錄</div>
      <div id="recent-list"><div class="loading">載入中…</div></div>
    </div>
  </div>

  <!-- ── 記錄 ── -->
  <div id="page-records" class="page">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="rec-month-title">—</div>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="cat-pills" id="filter-pills"></div>
    <div id="records-list"><div class="loading">載入中…</div></div>
  </div>

  <!-- ── 圖表 ── -->
  <div id="page-charts" class="page">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="chart-month-title">—</div>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="card">
      <div class="card-title">支出分類（圓餅圖）</div>
      <div class="chart-wrap"><canvas id="pie-chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">每日趨勢（折線圖）</div>
      <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">收支對比（長條圖）</div>
      <div class="chart-wrap-sm"><canvas id="bar-chart"></canvas></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://diuxxjbnkptdsfuacbeh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-xgCx3QhGHW7KRuYZBR4mw_5NkiOnzD';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 分類（無 emoji）
const CATEGORIES = {
  expense: [
    { id: 'food',      label: '餐飲' },
    { id: 'transport', label: '交通' },
    { id: 'shopping',  label: '購物' },
    { id: 'entertain', label: '娛樂' },
    { id: 'health',    label: '醫療' },
    { id: 'bill',      label: '帳單' },
    { id: 'other_exp', label: '其他' },
  ],
  income: [
    { id: 'salary',    label: '薪資' },
    { id: 'bonus',     label: '獎金' },
    { id: 'invest',    label: '投資' },
    { id: 'other_inc', label: '其他收入' },
  ]
};

let currentType = 'expense';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let allTxData = [];
let filterCat = 'all';
let pieChart = null, lineChart = null, barChart = null;

const fmt = n => '$' + Math.abs(n).toLocaleString('zh-TW');
const padM = m => String(m).padStart(2, '0');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  updateMonthTitles();
  if (name === 'home') loadHome();
  if (name === 'records') loadRecords();
  if (name === 'charts') loadCharts();
}

function updateMonthTitles() {
  const title = `${currentYear} 年 ${currentMonth} 月`;
  ['home-month-title','rec-month-title','chart-month-title'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = title;
  });
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  filterCat = 'all';
  updateMonthTitles();
  const activePage = document.querySelector('.page.active');
  if (!activePage) return;
  const id = activePage.id;
  if (id === 'page-home') loadHome();
  if (id === 'page-records') loadRecords();
  if (id === 'page-charts') loadCharts();
}

async function fetchMonth() {
  const from = `${currentYear}-${padM(currentMonth)}-01`;
  const lastDay = new Date(currentYear, currentMonth, 0).getDate();
  const to = `${currentYear}-${padM(currentMonth)}-${lastDay}`;
  const { data, error } = await db
    .from('transactions').select('*')
    .gte('tx_date', from).lte('tx_date', to)
    .order('tx_date', { ascending: false });
  if (error) { showToast('載入失敗：' + error.message); return []; }
  return data || [];
}

async function loadHome() {
  const txs = await fetchMonth();
  const expenses = txs.filter(t => t.tx_type === 'expense');
  const incomes  = txs.filter(t => t.tx_type === 'income');
  const totalExp = expenses.reduce((s, t) => s + Number(t.amount), 0);
  const totalInc = incomes.reduce((s, t) => s + Number(t.amount), 0);
  const net = totalInc - totalExp;

  document.getElementById('total-expense').textContent = fmt(totalExp);
  document.getElementById('total-income').textContent  = fmt(totalInc);
  document.getElementById('expense-count').textContent = `${expenses.length} 筆`;
  document.getElementById('income-count').textContent  = `${incomes.length} 筆`;
  const netEl = document.getElementById('net-amount');
  netEl.textContent = (net >= 0 ? '+' : '-') + fmt(net);
  netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--accent)';

  const list = document.getElementById('recent-list');
  const recent = txs.slice(0, 5);
  if (recent.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>還沒有記錄，在上方新增一筆吧！</p></div>';
    return;
  }
  list.innerHTML = recent.map(t => txItemHTML(t)).join('');
}

async function loadRecords() {
  allTxData = await fetchMonth();
  buildFilterPills();
  renderRecords();
}

function buildFilterPills() {
  const pills = document.getElementById('filter-pills');
  const usedCats = [...new Set(allTxData.map(t => t.category))];
  const allCats = [...CATEGORIES.expense, ...CATEGORIES.income];
  pills.innerHTML = `<span class="cat-pill ${filterCat === 'all' ? 'active' : ''}" onclick="setFilter('all')">全部</span>` +
    usedCats.map(c => {
      const cat = allCats.find(x => x.id === c);
      const label = cat ? cat.label : c;
      return `<span class="cat-pill ${filterCat === c ? 'active' : ''}" onclick="setFilter('${c}')">${label}</span>`;
    }).join('');
}

function setFilter(cat) {
  filterCat = cat;
  buildFilterPills();
  renderRecords();
}

function renderRecords() {
  const list = document.getElementById('records-list');
  const filtered = filterCat === 'all' ? allTxData : allTxData.filter(t => t.category === filterCat);
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>這個月沒有記錄</p></div>';
    return;
  }
  const groups = {};
  filtered.forEach(t => {
    if (!groups[t.tx_date]) groups[t.tx_date] = [];
    groups[t.tx_date].push(t);
  });
  list.innerHTML = Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(date => {
    const [y, m, d] = date.split('-');
    const wd = ['日','一','二','三','四','五','六'][new Date(date).getDay()];
    return `<div class="tx-date-group">
      <div class="tx-date-label">${y}/${m}/${d}（週${wd}）</div>
      ${groups[date].map(t => txItemHTML(t, true)).join('')}
    </div>`;
  }).join('');
}

function catLabel(id) {
  const all = [...CATEGORIES.expense, ...CATEGORIES.income];
  const c = all.find(x => x.id === id);
  return c ? c.label : id;
}

function catInitial(id) {
  return catLabel(id).charAt(0);
}

function txItemHTML(t, showDelete = false) {
  const label = catLabel(t.category);
  const sign = t.tx_type === 'expense' ? '−' : '+';
  const cls  = t.tx_type === 'expense' ? 'expense' : 'income';
  const deleteBtn = showDelete ? `<button class="tx-delete" onclick="deleteTransaction('${t.id}')">✕</button>` : '';
  return `<div class="tx-item">
    <div class="tx-icon">${catInitial(t.category)}</div>
    <div class="tx-info">
      <div class="tx-note">${t.note || label}</div>
      <div class="tx-cat">${label}</div>
    </div>
    <div class="tx-amount ${cls}">${sign}${fmt(t.amount)}</div>
    ${deleteBtn}
  </div>`;
}

function setType(type) {
  currentType = type;
  document.getElementById('btn-expense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  document.getElementById('btn-income').className  = 'type-btn' + (type === 'income'  ? ' active-income'  : '');
  buildCategorySelect();
}

function buildCategorySelect() {
  const sel = document.getElementById('inp-category');
  sel.innerHTML = CATEGORIES[currentType].map(c => `<option value="${c.id}">${c.label}</option>`).join('');
}

async function addTransaction() {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const category = document.getElementById('inp-category').value;
  const note  = document.getElementById('inp-note').value.trim();
  const date  = document.getElementById('inp-date').value;

  if (!amount || amount <= 0) { showToast('請輸入正確金額'); return; }
  if (!date) { showToast('請選擇日期'); return; }

  const { error } = await db.from('transactions').insert([{
    tx_type: currentType, amount, category,
    note: note || null, tx_date: date
  }]);

  if (error) { showToast('新增失敗：' + error.message); return; }

  showToast('✓ 已記錄！');
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-note').value = '';

  const [y, m] = date.split('-');
  currentYear = parseInt(y);
  currentMonth = parseInt(m);
  updateMonthTitles();
  loadHome();
}

async function deleteTransaction(id) {
  if (!confirm('確定要刪除這筆記錄嗎？')) return;
  const { error } = await db.from('transactions').delete().eq('id', id);
  if (error) { showToast('刪除失敗'); return; }
  showToast('已刪除');
  loadRecords();
}

const CHART_COLORS = ['#c0392b','#d35400','#c9a96e','#27ae60','#2980b9','#8e44ad','#7f8c8d','#2c3e50'];

async function loadCharts() {
  const txs = await fetchMonth();
  const allCats = [...CATEGORIES.expense, ...CATEGORIES.income];

  // 圓餅圖
  const expByCat = {};
  txs.filter(t => t.tx_type === 'expense').forEach(t => {
    expByCat[t.category] = (expByCat[t.category] || 0) + Number(t.amount);
  });
  const pieLabels = Object.keys(expByCat).map(k => catLabel(k));
  const pieData = Object.values(expByCat);

  if (pieChart) pieChart.destroy();
  if (pieData.length > 0) {
    pieChart = new Chart(document.getElementById('pie-chart'), {
      type: 'doughnut',
      data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: CHART_COLORS, borderWidth: 2, borderColor: '#faf7f2' }] },
      options: { plugins: { legend: { position: 'bottom', labels: { font: { family: 'Noto Sans TC', size: 11 }, padding: 10, color: '#2c2416' } } }, cutout: '55%' }
    });
  }

  // 折線圖
  const lastDay = new Date(currentYear, currentMonth, 0).getDate();
  const days = Array.from({length: lastDay}, (_, i) => String(i+1).padStart(2,'0'));
  const dailyExp = {}, dailyInc = {};
  days.forEach(d => { dailyExp[d] = 0; dailyInc[d] = 0; });
  txs.forEach(t => {
    const d = t.tx_date.split('-')[2];
    if (t.tx_type === 'expense') dailyExp[d] = (dailyExp[d]||0) + Number(t.amount);
    else dailyInc[d] = (dailyInc[d]||0) + Number(t.amount);
  });

  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('line-chart'), {
    type: 'line',
    data: {
      labels: days.map(d => d + '日'),
      datasets: [
        { label: '支出', data: days.map(d => dailyExp[d]), borderColor: '#c0392b', backgroundColor: 'rgba(192,57,43,0.08)', tension: 0.4, fill: true, pointRadius: 3 },
        { label: '收入', data: days.map(d => dailyInc[d]), borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.06)', tension: 0.4, fill: true, pointRadius: 3 }
      ]
    },
    options: {
      plugins: { legend: { labels: { font: { family: 'Noto Sans TC', size: 11 }, color: '#2c2416' } } },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 10 }, color: '#9e8e76' }, grid: { color: 'rgba(0,0,0,0.04)' } },
        y: { ticks: { font: { size: 10 }, color: '#9e8e76', callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(0,0,0,0.04)' } }
      }
    }
  });

  // 長條圖（近6個月）
  const months6 = [];
  for (let i = 5; i >= 0; i--) {
    let m = currentMonth - i, y = currentYear;
    if (m <= 0) { m += 12; y--; }
    months6.push({ y, m });
  }
  const monthExpArr = Array(6).fill(0);
  const monthIncArr = Array(6).fill(0);
  const from6 = `${months6[0].y}-${padM(months6[0].m)}-01`;
  const lastDayLast = new Date(months6[5].y, months6[5].m, 0).getDate();
  const to6 = `${months6[5].y}-${padM(months6[5].m)}-${lastDayLast}`;
  const { data: data6 } = await db.from('transactions').select('*').gte('tx_date', from6).lte('tx_date', to6);
  if (data6) {
    data6.forEach(t => {
      const td = new Date(t.tx_date);
      const idx = months6.findIndex(({y, m}) => y === td.getFullYear() && m === td.getMonth()+1);
      if (idx >= 0) {
        if (t.tx_type === 'expense') monthExpArr[idx] += Number(t.amount);
        else monthIncArr[idx] += Number(t.amount);
      }
    });
  }

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels: months6.map(({m}) => `${m}月`),
      datasets: [
        { label: '支出', data: monthExpArr, backgroundColor: 'rgba(192,57,43,0.75)', borderRadius: 4 },
        { label: '收入', data: monthIncArr, backgroundColor: 'rgba(39,174,96,0.7)', borderRadius: 4 }
      ]
    },
    options: {
      plugins: { legend: { labels: { font: { family: 'Noto Sans TC', size: 11 }, color: '#2c2416' } } },
      scales: {
        x: { ticks: { font: { size: 11 }, color: '#9e8e76' }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: '#9e8e76', callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(0,0,0,0.04)' } }
      }
    }
  });
}

function init() {
  const today = new Date();
  document.getElementById('inp-date').value = today.toISOString().split('T')[0];
  buildCategorySelect();
  updateMonthTitles();
  loadHome();
}

init();
</script>
</body>
</html>
